#
# /etc/pacman.conf — Lin OS
#
# This pacman.conf is used both:
#   1. By `mkarchiso` to bootstrap the live ISO's airootfs.
#   2. As the live ISO's /etc/pacman.conf so users can install more packages.
#
# Repository strategy:
#   - core / extra / multilib  : official Arch repositories
#   - chaotic-aur              : prebuilt AUR packages (bauh, pamac-aur, etc.)
#                                so the live ISO ships with the app store ready
#                                to go without a 15-minute AUR build in CI.
#   - lin-local                : local repo overlay populated by the CI build
#                                with lin-branding / lin-welcome / lin-defaults.
#
# To disable third-party repos after install, comment out [chaotic-aur].
# ---------------------------------------------------------------------------

[options]
HoldPkg           = pacman glibc
Architecture      = auto
CheckSpace
SigLevel          = Required DatabaseOptional
LocalFileSigLevel = Optional
ParallelDownloads = 5
# Don't colorize by default — broken on some terminals during install.
Color
VerbosePkgLists
ILoveCandy

# ---- Official repos --------------------------------------------------------
#
# The mirrorlist is shipped at /etc/pacman.d/mirrorlist and managed by
# reflector on first boot.
[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist

# ---- Chaotic-AUR (prebuilt AUR packages) ----------------------------------
# Provides: bauh, pamac-aur, hyprland-git (when needed), and many other AUR
# packages prebuilt. Trust: signed by Chaotic-AUR team key.
# Keyring is installed by the lin-defaults package (or you can install
# chaotic-keyring manually after first boot).
[chaotic-aur]
Include = /etc/pacman.d/chaotic-mirrorlist

# ---- Lin OS local repo (populated by CI build) ----------------------------
# This repo is created in the build container at /repo/lin-local during the
# GitHub Actions build and contains locally-built packages:
#   lin-branding, lin-welcome, lin-defaults
# If you're building locally without these packages, comment this out.
[lin-local]
Server = file:///repo/$arch
SigLevel = Optional TrustAll
