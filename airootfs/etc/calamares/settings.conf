# =============================================================================
# Calamares — Lin OS installer configuration
# =============================================================================
# This file is the entry point for Calamares. It defines:
#   - The sequence of installer modules (the "wizard" steps)
#   - Branding (which theme to use)
#   - Whether to show / hide specific steps
#
# The wizard sequence below is designed to be as short as possible while
# still being safe — a user can install Lin OS in ~5 clicks:
#
#   1. Welcome     → "Welcome to Lin OS" with language picker
#   2. Locale      → pick region/zone
#   3. Keyboard    → pick layout
#   4. Partition   → choose disk + autopartition (or manual)
#   5. Users       → pick username, hostname, password
#   6. Summary     → review
#   7. Install     → unpackfs copies the live ISO onto the disk
#   8. Finish      → reboot prompt
#
# The "Install" stage uses `unpackfs` to copy the live ISO's root filesystem
# directly onto the disk. This is how most modern Arch derivatives
# (Garuda, EndeavourOS) install — no separate install stage needed.
# =============================================================================

# ---------------------------------------------------------------------------
# Module sequence
# ---------------------------------------------------------------------------
sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - users
      - summary
  - exec:
      - partition
      - mount
      - unpackfs
      - machineid
      - fstab
      - locale
      - keyboard
      - localecfg
      - users
      - displaymanager
      - networkcfg
      - hwclock
      - services-systemd
      - bootloader
      - packages
      - luksbootkeyfile
      - plymouthcfg
      - removeuser
      - initcpiocfg
      - initcpio
      - shellprocess@lin-finalize
  - show:
      - finished

# ---------------------------------------------------------------------------
# Branding
# ---------------------------------------------------------------------------
branding: lin

# ---------------------------------------------------------------------------
# Misc
# ---------------------------------------------------------------------------
prompt-install: true
# Don't try to enter "do-not-touch" mode (we don't have an OEM scenario)
dont-chroot: false
# Accept the languages we ship translations for
requirements:
  requiredStorage:    8.0    # GB
  requiredRam:        1.5    # GB (we idle at 150MB so 1.5GB is plenty)
  internetCheck:      false  # don't block install if offline
  check:
    - storage
    - ram
    - power
    - root
  required:
    - storage
    - ram
    - root
