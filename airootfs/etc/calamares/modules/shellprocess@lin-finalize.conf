# Calamares — shellprocess@lin-finalize module
# =============================================================================
# Runs a final shell script on the installed system after everything else.
# =============================================================================
---
# Runs inside the chroot of the installed system
dontChroot: false
script:
  # 1. Make sure /etc/skel contents are copied to the new user's home
  - "if [ -d /home/${USER} ]; then cp -aT /etc/skel/. /home/${USER}/ 2>/dev/null || true; chown -R ${USER}:${USER} /home/${USER}; fi"
  # 2. Enable chaotic-aur pacman key
  - "pacman-key --recv-key 3056513887B78AEB --keyserver keyserver.ubuntu.com || true"
  - "pacman-key --lsign-key 3056513887B78AEB || true"
  # 3. Make sure flatpak flathub remote is added
  - "flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo || true"
  # 4. Update pacman db
  - "pacman -Sy --noconfirm || true"
  # 5. Clean up live-only polkit rule (installed system should require passwords)
  - "rm -f /etc/polkit-1/rules.d/10-lin-wheel.rules"
  # 6. Remove live-only sudoers rule
  - "rm -f /etc/sudoers.d/10-lin-wheel"
  # 7. Make sure the default user has a password (if they set one, this is a no-op)
  - "echo '${USER}:${USER_PASSWORD}' | chpasswd || true"
  # 8. Enable the lin-firstboot service (runs on first boot of installed system)
  - "systemctl enable lin-firstboot.service || true"
  # 9. Stamp that we've installed (so firstboot knows)
  - "rm -f /var/lib/lin/.firstboot-done /var/lib/lin/.welcome-shown"
