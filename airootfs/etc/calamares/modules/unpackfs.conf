# Calamares — unpackfs module
# =============================================================================
# This is the heart of the installer. It copies the live ISO's airootfs
# (already in memory) directly onto the target disk.
# =============================================================================
---
# Source: the squashfs that archiso already unpacked into /run/archiso/bootmnt
#         during live boot. /run/archiso/airootfs is the overlay-mounted root.
source: /run/archiso/airootfs

# Destination: the target system's mount point
sourceType: dir

# What to exclude from the copy (live-only junk we don't want on disk)
exclude:
  - /home/lin/.cache
  - /var/cache/pacman/pkg
  - /run/*
  - /tmp/*
  - /var/log/journal
  - /var/log/lynx*

# Weight: roughly the time this step takes (1.0 = ~5 min)
weight: 1
