# Calamares — packages module
# =============================================================================
# Optionally installs / removes packages on the installed system.
# =============================================================================
---
# We don't need this — unpackfs already copies the entire live ISO's
# filesystem onto the disk. So we use this only to:
#   1. Remove live-only packages we don't want on the installed system.
#   2. Run a final pacman -Syu to make sure everything's up to date.

# Operations run inside the chroot of the installed system
packageOperations:
  - install:
      - chaotic-keyring
  - remove:
      - calamares           # don't ship the installer on the installed system
      - calamares-branding-lin
      - arch-install-scripts

# Try to update the mirrorlist first
updateDb: true
skipIfNoInternet: true
