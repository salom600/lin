# Calamares — partition module
---
# Autopartition options shown to the user:
#   - erase   : wipe the whole disk and install Lin OS (the "one-click" path)
#   - replace : replace an existing partition
#   - alongside: shrink an existing OS and install alongside
#   - manual  : full manual partitioning
defaultPartitionTableType: gpt

# Allow these schemes
partitionTableTypes:
  - gpt
  - msdos

# Filesystem choices for manual partitioning
availableFilesystems:
  - ext4
  - btrfs
  - xfs
  - f2fs
  - fat32

# Auto-partition layout when "erase" is chosen (single disk install)
defaultFsType: ext4

# Enable LUKS encryption option in autopartition
enableLuksAutomatedPartitioning: true

# BTRFS subvolumes if user picks btrfs
btrfsSubvolumes:
  - name: "@"
    mountpoint: "/"
  - name: "@home"
    mountpoint: "/home"
  - name: "@var"
    mountpoint: "/var"
  - name: "@snapshots"
    mountpoint: "/.snapshots"

# Suggested swap size (in GiB). Set to null to use RAM-size (hibernation-capable).
# We use 4 GiB which is plenty for a desktop.
suggestedSwapSize: 4G
