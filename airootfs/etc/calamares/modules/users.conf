# Calamares — users module
---
# User account settings for the installed system.

# Don't auto-create the live user (we already have one)
defaultGroups:
  - name: wheel       # sudo
  - name: audio
  - name: video
  - name: network
  - name: storage
  - name: optical
  - name: power
  - name: lp
  - name: rfkill

# Don't auto-login on the installed system (more secure)
doAutologin: false

# Set root password same as user password (so sudo works out of the box)
setRootPassword: true

# Allow weak passwords but warn (user-friendly for new Linux users)
allowWeakPasswords: true
doPasswordCheck: true

# Don't ask for the hostname separately — derive it from the username
writeRootPassword: true

# Pre-fill the username "lin" (user can change)
userShell: /bin/zsh
