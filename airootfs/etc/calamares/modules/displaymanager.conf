# Calamares — displaymanager module
# =============================================================================
# Configures the SDDM display manager on the installed system.
# =============================================================================
---
# Use SDDM (already enabled in the live image via customize_airootfs.sh)
displaymanagers:
  - sddm

# Auto-login the user (comment out if you want a login screen on every boot)
autoLogin: true
# The user to auto-login (will be replaced with whatever the user picked
# during the users step)
autologinUser: lin

# Don't try to start the DM during install
basicSetup: false
