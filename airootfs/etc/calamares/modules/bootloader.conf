# Calamares — bootloader module
# =============================================================================
# Installs GRUB to the target disk. Supports both BIOS and UEFI.
# =============================================================================
---
# Use GRUB as the bootloader
efiBootloader: "grub"
kernel: "/boot/vmlinuz-linux"
img: "/boot/initramfs-linux.img"
fallback: "/boot/initramfs-linux-fallback.img"

# GRUB install location (BIOS mode)
bootloaderEntryName: "Lin OS"

# Kernel command line
kernelLine: "[^v]inux"
fallbackKernelLine: "[^f]allback"

# Time to show the GRUB menu
timeout: "5"

# Don't install GRUB to a partition (always install to MBR or ESP)
neverInstallTo: "/dev/loop"

# Additional GRUB configuration to append
extraConfig: |
  GRUB_DISABLE_SUBMENU=y
  GRUB_DEFAULT=saved
  GRUB_SAVEDEFAULT=true
  GRUB_DISTRIBUTOR="Lin OS"
  GRUB_CMDLINE_LINUX_DEFAULT="quiet rw loglevel=3 systemd.show_status=false"
  GRUB_BACKGROUND="/usr/share/backgrounds/lin/lin-grub.png"
  GRUB_GFXMODE=auto
  GRUB_GFXPAYLOAD_LINUX=keep
