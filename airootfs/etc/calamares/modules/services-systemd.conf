# Calamares — services-systemd module
# =============================================================================
# Enables / disables systemd services on the installed system.
# =============================================================================
---
# Services to enable on the installed system (these are NOT the live ISO ones)
services:
  - name: NetworkManager
    action: enable
  - name: sddm
    action: enable
  - name: bluetooth
    action: enable
  - name: systemd-resolved
    action: enable
  - name: systemd-timesyncd
    action: enable
  - name: haveged
    action: enable
  - name: tlp
    action: enable
  - name: acpid
    action: enable
  - name: upower
    action: enable
  - name: systemd-boot-update
    action: enable
  - name: lin-firstboot
    action: enable
  - name: reflector.timer
    action: enable

# Mask services we don't want on the installed system either
mask:
  - systemd-networkd-wait-online
