# mkinitcpio.conf — Lin OS live ISO
#
# This config is for the LIVE ISO only. The installed system regenerates
# its own initramfs via Calamares' mkinitcpio module.
#
# Hooks:
#   base        -> core utilities
#   udev        -> device nodes
#   modconf     -> modprobe.d configs
#   block       -> block device discovery
#   filesystems -> filesystem drivers
#   keyboard    -> keyboard layout in initramfs
#   keymap      -> console keymap
#   encrypt     -> LUKS support (for encrypted installs)
#   lvm2        -> LVM support
#   fsck        -> filesystem check at boot
#   shutdown    -> clean shutdown from initramfs
#   systemd     -> systemd in initramfs (faster boot)
#   archiso     -> archiso live boot magic
#

MODULES=()
BINARIES=()
FILES=()

HOOKS=(base systemd udev modconf block keyboard keymap encrypt lvm2 filesystems fsck shutdown archiso)
COMPRESSION="zstd"
COMPRESSION_OPTIONS=(-c -T0 -19)
MODULES_DECOMPRESS="yes"
