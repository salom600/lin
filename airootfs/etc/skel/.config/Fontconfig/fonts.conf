<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!-- =========================================================================
     Lin OS — fontconfig defaults
     =========================================================================
     Uses Inter for UI, FiraCode Nerd Font for monospace, Noto for CJK/emoji.
     Subpixel RGB hinting for crisp text.
     ========================================================================= -->
<fontconfig>

  <!-- Default sans-serif -->
  <match target="pattern">
    <test name="family"><string>sans-serif</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Inter</string>
      <string>Noto Sans</string>
      <string>Noto Sans CJK SC</string>
      <string>Noto Color Emoji</string>
    </edit>
  </match>

  <!-- Default serif -->
  <match target="pattern">
    <test name="family"><string>serif</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Noto Serif</string>
      <string>Noto Serif CJK SC</string>
    </edit>
  </match>

  <!-- Default monospace -->
  <match target="pattern">
    <test name="family"><string>monospace</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>FiraCode Nerd Font</string>
      <string>JetBrains Mono</string>
      <string>Noto Sans Mono CJK SC</string>
    </edit>
  </match>

  <!-- Force system UI font to Inter (Win11-like) -->
  <match target="pattern">
    <test name="family"><string>system-ui</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Inter</string>
    </edit>
  </match>

  <!-- Default hinting -->
  <match target="font">
    <edit name="antialias" mode="assign"><bool>true</bool></edit>
    <edit name="hinting" mode="assign"><bool>true</bool></edit>
    <edit name="hintstyle" mode="assign"><const>hintslight</const></edit>
    <edit name="rgba" mode="assign"><const>rgb</const></edit>
    <edit name="lcdfilter" mode="assign"><const>lcddefault</const></edit>
    <edit name="autohint" mode="assign"><bool>false</bool></edit>
  </match>

  <!-- Disable bitmap fonts -->
  <selectfont>
    <rejectfont>
      <glob>/usr/share/fonts/75dpi/*</glob>
      <glob>/usr/share/fonts/100dpi/*</glob>
    </rejectfont>
  </selectfont>

</fontconfig>
