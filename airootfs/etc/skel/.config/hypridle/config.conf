# ==========================================================================
# Lin OS — hypridle (idle management) config
# ==========================================================================
# Locks the screen after 10 min idle, turns off the screen at 15 min,
# and suspends at 30 min. This is what makes "0% CPU at idle" actually
# possible — when the user walks away, the system suspends.
# ==========================================================================

general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid double-lock
    unlock_cmd = loginctl unlock-session
    before_sleep_cmd = loginctl lock-session    # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on  # screen on after wake
}

# ---- Dim screen after 5 min -----------------------------------------------
listener {
    timeout = 300
    on-timeout = brightnessctl -s set 20       # dim to 20%
    on-resume  = brightnessctl -r              # restore
}

# ---- Lock screen after 10 min ---------------------------------------------
listener {
    timeout = 600
    on-timeout = loginctl lock-session
}

# ---- Turn off screen after 15 min -----------------------------------------
listener {
    timeout = 900
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# ---- Suspend after 30 min -------------------------------------------------
listener {
    timeout = 1800
    on-timeout = systemctl suspend
}
