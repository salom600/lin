# ==========================================================================
# Lin OS — hyprpaper (wallpaper daemon) config
# ==========================================================================
# Sets the desktop wallpaper. The wallpaper file is shipped by the
# lin-branding package at /usr/share/backgrounds/lin/lin-default.png.
# ==========================================================================

# Preload the wallpaper (cached in VRAM for instant switching)
preload  = /usr/share/backgrounds/lin/lin-default.png
preload  = /usr/share/backgrounds/lin/lin-aurora.png

# Set it on all monitors
wallpaper = ,/usr/share/backgrounds/lin/lin-default.png

# Disable the splash text (false = no splash)
splash = false

# Misc
# Allows hyprpaper to unload wallpapers not in use (saves VRAM)
unload_unused = true
