# =============================================================================
# Hyprland keybinds — Lin OS
# =============================================================================
# Designed for Windows migrants: Super (Windows key) is the primary modifier,
# matching Windows 11 shortcuts where possible.
#
# Conventions:
#   SUPER     = Windows key (or Cmd on Mac keyboards)
#   SUPER+Q   = close window        (Win11: Alt+F4 — we also support Alt+F4)
#   SUPER+TAB = switch workspace    (Win11: Ctrl+Win+Left/Right)
#   SUPER+ENTER = terminal          (Win11: Win+X then T)
# =============================================================================

# ---- Essential window management -------------------------------------------
bind = SUPER, Q,       killactive,
bind = SUPER SHIFT, Q, killactive,
bind = SUPER ALT, Q,   exit,            # exit Hyprland
bind = SUPER, F,       fullscreen, 0
bind = SUPER, SPACE,   togglefloating,
bind = SUPER, P,       pseudo,          # dwindle pseudo-tile
bind = SUPER, T,       togglesplit,     # dwindle split orientation

# ---- Application launchers -------------------------------------------------
bind = SUPER, Return,  exec, $terminal
bind = SUPER, D,       exec, $menu            # Win11: Super+S / Super
bind = SUPER, E,       exec, $fileManager     # Win11: Win+E
bind = SUPER, B,       exec, $browser         # Win11: nothing standard
bind = SUPER, S,       exec, $store           # Open Lin Store
bind = SUPER, L,       exec, $lock            # Lock screen
bind = SUPER SHIFT, S, exec, $screenshot      # Win11: Win+Shift+S
bind =,       Print,   exec, $fullscreenSS

# ---- Focus movement (Vim + arrows) -----------------------------------------
bind = SUPER, left,  movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up,    movefocus, u
bind = SUPER, down,  movefocus, d
bind = SUPER, H,     movefocus, l
bind = SUPER, L,     movefocus, r
bind = SUPER, K,     movefocus, u
bind = SUPER, J,     movefocus, d

# ---- Move windows ----------------------------------------------------------
bind = SUPER SHIFT, left,  movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up,    movewindow, u
bind = SUPER SHIFT, down,  movewindow, d
bind = SUPER SHIFT, H,     movewindow, l
bind = SUPER SHIFT, L,     movewindow, r
bind = SUPER SHIFT, K,     movewindow, u
bind = SUPER SHIFT, J,     movewindow, d

# ---- Resize windows --------------------------------------------------------
bind = SUPER, R, submap, resize

# ---- Workspaces (Windows 11: Win+1..9 to switch, Ctrl+Win+Left/Right) ------
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Move window to workspace
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Cycle workspaces (Win11: Ctrl+Win+Left/Right)
bind = SUPER CTRL, left,  workspace, -1
bind = SUPER CTRL, right, workspace, +1

# Scroll through workspaces with mouse wheel
bind = SUPER, mouse_down, workspace, +1
bind = SUPER, mouse_up,   workspace, -1

# ---- Special workspace (dropdown terminal / scratchpad) --------------------
bind = SUPER, grave,   togglespecialworkspace,
bind = SUPER SHIFT, grave, movetoworkspace, special

# ---- System controls -------------------------------------------------------
bind = SUPER SHIFT, E, exec, wlogout -b 4 -T 300 -B 300   # power menu
bind = SUPER SHIFT, R, exec, hyprctl reload               # reload config
bind = SUPER SHIFT, P, exec, hyprpicker                   # color picker

# ---- Media keys ------------------------------------------------------------
bindl  = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindl  = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,         exec, wpctl set-mute   @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute,      exec, wpctl set-mute   @DEFAULT_AUDIO_SOURCE@ toggle
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPrev,         exec, playerctl previous
bindl  = , XF86AudioStop,         exec, playerctl stop

# ---- Brightness ------------------------------------------------------------
bindl  = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
bindl  = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ---- Screenshots -----------------------------------------------------------
bind = SUPER SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
bind = SUPER, Print, exec, grim - | wl-copy
bind =,  Print,      exec, grim "$(xdg-user-dir PICTURES)/Screenshots/$(date +%Y%m%d_%H%M%S).png"

# ---- Mouse bindings (move/resize floating windows) -------------------------
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
