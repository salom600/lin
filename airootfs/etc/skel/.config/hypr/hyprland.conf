# =============================================================================
# Hyprland config — Lin OS
# =============================================================================
# This is the main configuration for the Hyprland Wayland compositor.
# It defines:
#   - Monitor setup
#   - Programs (terminal, launcher, browser)
#   - Visuals (gaps, borders, transparency, blur, rounded corners)
#   - Animations (Windows 11-like smooth animations)
#   - Input (keyboard, touchpad, keybinds)
#   - Window rules (per-app transparency, float, etc.)
#   - Autostart (waybar, wallpaper, polkit, etc.)
#
# Docs: https://wiki.hyprland.org/Configuring/
# =============================================================================

# ---- Source additional configs ---------------------------------------------
source = ~/.config/hypr/monitors.conf   # generated by lin-welcome on first boot
source = ~/.config/hypr/keybinds.conf   # keybinds split out for clarity

# =============================================================================
# 1. Monitors (fallback if monitors.conf doesn't exist)
# =============================================================================
# Auto-detect and use 60Hz; if you have a HiDPI display, set scale=2 here.
monitor=,preferred,auto,1
# Mirror a second display if present
monitor=HDMI-A-1,1920x1080@60,0x0,1,mirror,DSLI-1

# =============================================================================
# 2. Programs
# =============================================================================
$terminal       = kitty
$fileManager    = thunar
$menu           = wofi --show drun --prompt "Search apps..."
$browser        = firefox
$store          = lin-store
$lock           = hyprlock
$screenshot     = grim -g "$(slurp)" - | wl-copy
$fullscreenSS   = grim - | wl-copy

# =============================================================================
# 3. Autostart
# =============================================================================
# Polkit (password prompts)
exec-once = /usr/lib/polkit-kde-agent/polkit-kde-authentication-agent-1
# Status bar
exec-once = waybar
# Wallpaper
exec-once = hyprpaper
# Notifications
exec-once = dunst
# Clipboard manager
exec-once = wl-paste --watch cliphist store
# Idle management (lock screen after 10 min, screen off after 15 min)
exec-once = hypridle
# Welcome window on first login
exec-once = lin-welcome
# Network applet
exec-once = nm-applet --indicator
# Bluetooth applet
exec-once = blueman-applet
# Update xdg-desktop-portal
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# =============================================================================
# 4. Environment variables
# =============================================================================
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,breeze_cursors
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GTK_THEME,Lin-Dark:dark
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = MOZ_ENABLE_WAYLAND,1
env = MOZ_DBUS_REMOTE,1
env = _JAVA_AWT_WM_NONREPARENTING,1

# =============================================================================
# 5. Look & Feel — Windows 11 / macOS style
# =============================================================================
general {
    # Gaps (Windows 11 has subtle gaps between windows)
    gaps_in = 4
    gaps_out = 8
    gaps_workspaces = 0

    # Border (thin, subtle — like Windows 11)
    border_size = 2
    no_border_on_floating = false

    # Layout (master+stack is most Windows-11-like)
    layout = master

    # Colors
    col.active_border   = rgba(0d6efdcc) rgba(8a2be2cc) 45deg
    col.inactive_border = rgba(595959aa)

    # Allow tearing for games
    allow_tearing = true

    # Resize on border hover (Windows 11-like)
    resize_on_border = true
    hover_icon_on_border = true
}

# ---- Master layout (one main window + side stack) --------------------------
master {
    new_status = master
    new_on_top = false
    mfact = 0.55
    orientation = left
    inherit_fullscreen = true
    smart_resizing = true
}

# ---- Window decorations ----------------------------------------------------
decoration {
    # Rounded corners (Windows 11 = 8px radius)
    rounding = 8

    # Blur — the "transparent" design requirement
    blur {
        enabled = true
        size = 8
        passes = 2
        new_optimizations = true
        ignore_opacity = true
        xray = true
        # Vibrancy makes colors pop through the blur (macOS-like)
        vibrancy = 0.1696
        vibrancy_darkness = 0.0
        noise = 0.0117
        contrast = 1.1
        brightness = 0.85
    }

    # Shadows (macOS-like soft drop shadows)
    drop_shadow = true
    shadow_range = 12
    shadow_render_power = 3
    shadow_ignore_window = true
    shadow_offset = 0 0
    shadow_scale = 1.0
    col.shadow = rgba(00000055)
    col.shadow_inactive = rgba(00000033)

    # Dim inactive windows slightly (focus indicator)
    dim_inactive = true
    dim_strength = 0.1
    dim_special = 0.2

    # Screen flashes for animations (Windows 11-like)
    screen_shader = ~/.config/hypr/shaders/default.frag
}

# =============================================================================
# 6. Animations — Windows 11 / macOS style smooth
# =============================================================================
animations {
    enabled = true
    # Default curve — slightly accelerated ease-out (feels modern)
    bezier = easeOutQuint, 0.22, 1, 0.36, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear, 1, 1, 1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1.0
    bezier = quick, 0.15, 0, 0.1, 1

    # Window open/close — slide in from bottom + fade (Windows 11-like)
    animation = windows, 1, quick, easeOutQuint, slide
    animation = windowsIn, 1, quick, easeOutQuint, slide
    animation = windowsOut, 1, quick, easeOutQuint, slide
    animation = windowsMove, 1, quick, easeOutQuint

    # Layers (notifications, popups)
    animation = layers, 1, quick, easeOutQuint, fade
    animation = layersIn, 1, quick, easeOutQuint, fade
    animation = layersOut, 1, quick, easeOutQuint, fade

    # Fade
    animation = fade, 1, quick, easeOutQuint
    animation = fadeIn, 1, quick, easeOutQuint
    animation = fadeOut, 1, quick, easeOutQuint
    animation = fadeSwitch, 1, quick, easeOutQuint
    animation = fadeShadow, 1, quick, easeOutQuint
    animation = fadeDim, 1, quick, easeOutQuint

    # Workspaces — slide when switching (Windows 11 virtual desktops)
    animation = workspaces, 1, 6, easeOutQuint, slide
    animation = workspacesIn, 1, 6, easeOutQuint, slide
    animation = workspacesOut, 1, 6, easeOutQuint, slide

    # Special workspace (dropdown terminal style)
    animation = specialWorkspace, 1, 6, easeOutQuint, slidefade

    # Border
    animation = border, 1, 4, easeOutQuint
}

# =============================================================================
# 7. Input
# =============================================================================
input {
    # Keyboard
    kb_layout = us,ar
    kb_variant =
    kb_model =
    kb_options = grp:win_space_toggle
    kb_rules =
    repeat_rate = 50
    repeat_delay = 250
    numlock_by_default = true

    # Touchpad (macOS-like natural scrolling)
    touchpad {
        natural_scroll = true
        clickfinger_behavior = true
        tap-to-click = true
        drag_lock = true
        scroll_factor = 0.6
        disable_while_typing = true
        tap-and-drag = true
    }

    # Mouse
    sensitivity = 0
    accel_profile = flat
    left_handed = false
    follow_mouse = 1
    float_switch_override_focus = 2

    # Tablet
    tablet {
        transform = 0
        left_handed = 0
    }
}

# ---- Cursor ----------------------------------------------------------------
cursor {
    no_hardware_cursors = true
    persistent_warps = true
    warp_on_change_workspace = true
    default_monitor =
    zoom_factor = 1.0
    zoom_rigid = false
    enable_hyprcursor = true
    sync_gsettings_theme = true
}

# =============================================================================
# 8. Gestures (laptop touchpad)
# =============================================================================
gestures {
    workspace_swipe = true
    workspace_swipe_forever = true
    workspace_swipe_distance = 200
    workspace_swipe_invert = false
    workspace_swipe_min_speed_to_force = 5
    workspace_swipe_cancel_ratio = 0.5
    workspace_swipe_create_new = true
    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 10
    workspace_swipe_fingers = 3
}

# =============================================================================
# 9. Misc
# =============================================================================
misc {
    # Disable "hyprland" splash text on startup
    disable_hyprland_logo = true
    disable_splash_rendering = true

    # VFR (variable frame rate) — saves CPU when nothing's animating
    vfr = true
    vrr = 0

    # Don't focus windows on hover (Windows 11 doesn't either)
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true

    # Allow dragging floating windows by clicking anywhere in them
    middle_click_paste = true

    # Renderunfocused
    render_unfocused_fps = 1

    # Hide cursor after 5 seconds of inactivity (text fields only)
    hide_cursor_on_touch = true

    # New window defaults
    new_window_takes_over_fullscreen = 2

    # Allow Screen Sharing via xdg-desktop-portal
    enable_swallow = true
    swallow_regex = ^(kitty)$
}

# =============================================================================
# 10. Window rules — per-app behavior
# =============================================================================
# Transparency for terminal and editor
windowrulev2 = opacity 0.92 0.85, class:^(kitty)$
windowrulev2 = opacity 0.95 0.90, class:^(firefox)$
windowrulev2 = opacity 0.95 0.90, class:^(thunar)$
windowrulev2 = opacity 0.90 0.85, class:^(code)$
windowrulev2 = opacity 0.90 0.85, class:^(Code)$

# Float these
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(wofi)$
windowrulev2 = float, class:^(lin-welcome)$
windowrulev2 = float, class:^(org.gnome.Calculator)$
windowrulev2 = float, class:^(org.gnome.Screenshot)$
windowrulev2 = float, class:^(gparted)$
windowrulev2 = float, class:^(calamares)$
windowrulev2 = float, class:^(bauh)$
windowrulev2 = float, class:^(pamac-manager)$

# Center some dialogs
windowrulev2 = center, class:^(wofi)$
windowrulev2 = center, class:^(lin-welcome)$
windowrulev2 = center, class:^(calamares)$

# Pin the menu/launcher
windowrulev2 = pin, class:^(wofi)$
windowrulev2 = nofocus, class:^(wofi)$

# Games — disable transparency and decorations for max performance
windowrulev2 = opacity 1.0, class:^(steam_app_)
windowrulev2 = fullscreen, class:^(steam_app_)

# No blur on Steam games (perf)
windowrulev2 = noblur, class:^(steam_app_)

# Picture-in-picture
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin, title:^(Picture-in-Picture)$
windowrulev2 = move 92% 92%, title:^(Picture-in-Picture)$

# Do not swallow these
windowrulev2 = noanim, class:^(wofi)$
windowrulev2 = noanim, class:^(dunst)$

# =============================================================================
# 11. Workspace configuration (Windows 11-like virtual desktops)
# =============================================================================
# Bind specific apps to specific workspaces
windowrulev2 = workspace 1 silent, class:^(firefox)$
windowrulev2 = workspace 2 silent, class:^(thunar)$
windowrulev2 = workspace 3 silent, class:^(kitty)$
windowrulev2 = workspace 4 silent, class:^(code|Code)$
windowrulev2 = workspace 5 silent, class:^(steam|Steam)$
windowrulev2 = workspace 6 silent, class:^(discord|Discord)$
windowrulev2 = workspace 7 silent, class:^(steam_app_)  # games

# Workspace names (shown in waybar)
wsbind = 1,name:Web
wsbind = 2,name:Files
wsbind = 3,name:Terminal
wsbind = 4,name:Code
wsbind = 5,name:Games
wsbind = 6,name:Chat
wsbind = 7,name:Fullscreen
wsbind = 8,name:Misc
wsbind = 9,name:Misc
wsbind = 10,name:Misc

# =============================================================================
# 12. Device-specific configs
# =============================================================================
# Disable touchpad when typing on laptops (already in input{})
# Add per-device configs here if needed

# Example: ThinkPad trackpoint
device {
    name = "TPPS/2 IBM TrackPoint"
    sensitivity = 0.5
}

# =============================================================================
# 13. Submap for resize mode (Super+R)
# =============================================================================
submap = resize
binde = , left,  resizeactive, -20 0
binde = , right, resizeactive, 20 0
binde = , up,    resizeactive, 0 -20
binde = , down,  resizeactive, 0 20
binde = , escape, submap, reset
submap = reset

# =============================================================================
# Done
# =============================================================================
