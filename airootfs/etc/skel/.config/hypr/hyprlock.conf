# ==========================================================================
# Lin OS — hyprlock (Wayland lock screen) config
# ==========================================================================
# A stylish, GPU-accelerated lock screen that matches the Lin OS theme.
# ==========================================================================

background {
    monitor =
    path = /usr/share/backgrounds/lin/lin-default.png
    blur_passes = 2
    blur_size = 6
    color = rgba(20, 22, 30, 0.85)
}

# ---- Time (large, centered) ----------------------------------------------
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255, 255, 255, 0.95)
    font_size = 120
    font_family = Inter
    position = 0, 200
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.5)
}

# ---- Date (smaller, below time) ------------------------------------------
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgba(255, 255, 255, 0.75)
    font_size = 28
    font_family = Inter
    position = 0, 100
    halign = center
    valign = center
}

# ---- Username ------------------------------------------------------------
label {
    monitor =
    text = Welcome back, $USER
    color = rgba(255, 255, 255, 0.85)
    font_size = 22
    font_family = Inter
    position = 0, 20
    halign = center
    valign = center
}

# ---- Password input ------------------------------------------------------
input-field {
    monitor =
    size = 320, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.4
    dots_center = true
    outer_color = rgba(99, 102, 241, 0.5)
    inner_color = rgba(40, 44, 60, 0.7)
    font_color = rgba(255, 255, 255, 0.95)
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i>Enter password...</i>
    hide_input = false
    check_color = rgba(99, 102, 241, 0.5)
    fail_color = rgba(239, 68, 68, 0.7)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    position = 0, -60
    halign = center
    valign = center
}

# ---- Caps-lock warning ---------------------------------------------------
label {
    monitor =
    text = CAPS LOCK
    color = rgba(245, 158, 11, 0.9)
    font_size = 14
    font_family = Inter
    position = 0, -120
    halign = center
    valign = center
    # Only show when caps lock is on
    text_align = center
}
