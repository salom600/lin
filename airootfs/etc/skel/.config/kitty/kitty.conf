# ==========================================================================
# Lin OS — kitty terminal config
# ==========================================================================
# A modern, GPU-accelerated terminal. Light on resources, supports
# transparency, ligatures, and modern font features.
# ==========================================================================

# ---- Font ----------------------------------------------------------------
font_family      FiraCode Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# Fallback fonts for emoji, CJK, etc.
symbol_map U+1F600-U+1F64F Noto Color Emoji
symbol_map U+2600-U+26FF   Noto Color Emoji
symbol_map U+2700-U+27BF   Noto Color Emoji
symbol_map U+3000-U+9FFF   Noto Sans CJK SC

# ---- Window --------------------------------------------------------------
remember_window_size  no
initial_window_width  900
initial_window_height 600
window_padding_width  8 12
window_border_width   0
draw_minimal_borders  yes
layout_option         tall
window_margin_width   0
single_window_margin_width 0
window_border_width   0

# ---- Translucency --------------------------------------------------------
background_opacity 0.92
background_blur 2
dynamic_background_opacity yes

# ---- Colors (Catppuccin Mocha-ish, with Lin OS accent) -------------------
foreground              #cdd6f4
background              #0d0d18
selection_foreground    #1e1e2e
selection_background    #f5e0dc
cursor                  #f5e0dc
cursor_text_color       #1e1e2e

# Black
color0 #45475a
color8 #585b70
# Red
color1 #f38ba8
color9 #f38ba8
# Green
color2  #a6e3a1
color10 #a6e3a1
# Yellow
color3  #f9e2af
color11 #f9e2af
# Blue
color4  #89b4fa
color12 #89b4fa
# Magenta
color5  #f5c2e7
color13 #f5c2e7
# Cyan
color6  #94e2d5
color14 #94e2d5
# White
color7  #bac2de
color15 #a6adc8

# ---- Scrollback ----------------------------------------------------------
scrollback_lines 10000
scrollback_pager_history_size 100

# ---- Mouse ---------------------------------------------------------------
url_color #89b4fa
url_style curly
open_url_modifiers ctrl
copy_on_select yes
strip_trailing_spaces smart

# ---- Bell ----------------------------------------------------------------
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell no
bell_on_tab no

# ---- Performance ---------------------------------------------------------
repaint_delay 10
input_delay 3
sync_to_monitor yes

# ---- Tabs ----------------------------------------------------------------
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{index} {fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{title}"

# ---- Shell ---------------------------------------------------------------
shell zsh
editor micro

# ---- Misc ----------------------------------------------------------------
allow_remote_control yes
listen_on unix:/tmp/kitty
update_check_interval 0
notify_on_cmd_finish invisible

# ---- Keybinds ------------------------------------------------------------
# New tab: ctrl+shift+t
map ctrl+shift+t new_tab
# Close tab: ctrl+shift+w
map ctrl+shift+w close_tab
# Switch tab: ctrl+shift+left/right
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab
# New window: ctrl+shift+enter
map ctrl+shift+enter new_window
# Split: ctrl+shift+] (vertical), ctrl+shift+[ (horizontal)
map ctrl+shift+] launch --location=vsplit --cwd=current
map ctrl+shift+[ launch --location=hsplit --cwd=current
